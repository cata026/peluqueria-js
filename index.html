<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Peluquería Debora World</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1> Peluquería Debora World</h1>
    <!-- <button id="darkModeBtn">🌙 Dark Mode</button> -->
</header>

<main>

    <h2>Reservar Turno</h2>

    <form id="formTurno">

        <input type="text" id="nombre" placeholder="Tu nombre" required>

        <label>Elegí un servicio:</label>

        <div class="servicios">

            <label id="corte" class="card">
                <input type="radio" name="servicio" value="Corte" required>
                <img src="corte.jpg">
                <p>Corte<br>
                $7000
                </p>
            </label>

            <label id="color" class="card">
                <input type="radio" name="servicio" value="Color">
                <img src="color.jpg">
                <p>Color <br>
                $20000
                </p>
            </label>

            <label id="peinado" class="card">
                <input type="radio" name="servicio" value="Peinado">
                <img src="peinado.jpg">
                <p>Peinado<br>
                $6000
                </p>
            </label>

        </div>

        <input type="date" id="fecha" required>
        <input type="time" id="hora" required>

        <button id="boton" type="submit">Reservar Turno</button>

    </form>

    <h2>Tus Proximos Turnos</h2>
    <div id="listaTurnos"></div>

</main>

<script src="main.js"></script>

</body>
</html>
